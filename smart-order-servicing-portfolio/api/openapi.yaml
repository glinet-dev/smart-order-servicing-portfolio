openapi: 3.0.3
info:
  title: Smart Order Servicing and Ancillary Continuity API
  version: 1.0.0
  description: |
    Public portfolio simulation API for airline order servicing. Aureon Air and Nexora Airways are fictional placeholders used for anonymized benchmarking. This API demonstrates Technical Product Owner thinking around order retrieve, servicing eligibility, split, change quote, cancellation, refund quote, ancillary continuity, idempotency, audit, and structured errors.
servers:
  - url: https://api.example.com/airline-retailing/v1
    description: Example server for portfolio simulation only
tags:
  - name: Orders
  - name: Servicing
  - name: Ancillaries
  - name: Refunds
  - name: Audit
paths:
  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Retrieve complete order
      description: Returns itinerary, passengers, payment status, order items, ancillaries, servicing eligibility summary, and audit reference.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Order retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{orderId}/servicing-eligibility:
    get:
      tags: [Servicing]
      summary: Check order servicing eligibility
      description: Shows allowed, blocked, and assisted-service actions at order and passenger level.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Eligibility evaluated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EligibilityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orders/{orderId}/split:
    post:
      tags: [Servicing]
      summary: Quote or confirm passenger split
      description: Creates a split quote or confirms an eligible split using an idempotency key.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitRequest'
      responses:
        '200':
          description: Split quoted or confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SplitResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /orders/{orderId}/change-quote:
    post:
      tags: [Servicing]
      summary: Generate change quote
      description: Reprices selected itinerary and returns fare difference, fees, taxes, total due/refund, quote expiry, and ancillary impact.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeQuoteRequest'
      responses:
        '200':
          description: Change quote generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangeQuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /orders/{orderId}/confirm-change:
    post:
      tags: [Servicing]
      summary: Confirm quoted change
      description: Confirms a valid, unexpired change quote idempotently.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmChangeRequest'
      responses:
        '200':
          description: Change confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmChangeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /orders/{orderId}/cancel:
    post:
      tags: [Servicing]
      summary: Cancel eligible order
      description: Cancels an eligible order after refund quote confirmation.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelRequest'
      responses:
        '200':
          description: Cancellation accepted or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelResponse'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /orders/{orderId}/refund-quote:
    post:
      tags: [Refunds]
      summary: Generate refund quote
      description: Returns ticket refund, taxes, penalties, ancillary refund lines, and quote expiry.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundQuoteRequest'
      responses:
        '200':
          description: Refund quote generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundQuoteResponse'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /orders/{orderId}/ancillary-continuity-check:
    post:
      tags: [Ancillaries]
      summary: Check ancillary continuity
      description: Determines whether paid and selected extras can be retained, reselected, repriced, refunded, or marked as unavailable.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AncillaryContinuityRequest'
      responses:
        '200':
          description: Ancillary continuity evaluated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AncillaryContinuityResponse'
        '422':
          $ref: '#/components/responses/Unprocessable'
  /orders/{orderId}/timeline:
    get:
      tags: [Audit]
      summary: Retrieve order timeline
      description: Returns audit events for quote, split, change, payment, refund, cancellation, and failed servicing attempts.
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Timeline retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:
                    type: string
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
components:
  parameters:
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
      example: ORD-123456789
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 128
      example: idem_7c1caa1d
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      example: corr_01HZY8ABC
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized or forbidden access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict such as duplicate or stale confirmation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unprocessable:
      description: Request is valid but cannot be processed due to business rules
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
          example: 125.50
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
    Passenger:
      type: object
      required: [passengerId, passengerType, displayName]
      properties:
        passengerId:
          type: string
          example: PAX-1
        passengerType:
          type: string
          enum: [ADT, CHD, INF]
        displayName:
          type: string
          example: Passenger 1
    Segment:
      type: object
      required: [segmentId, origin, destination, departureDateTime, arrivalDateTime, marketingCarrier, flightNumber]
      properties:
        segmentId:
          type: string
          example: SEG-1
        origin:
          type: string
          example: AAA
        destination:
          type: string
          example: BBB
        departureDateTime:
          type: string
          format: date-time
        arrivalDateTime:
          type: string
          format: date-time
        marketingCarrier:
          type: string
          example: AU
        flightNumber:
          type: string
          example: AU123
    OrderItem:
      type: object
      required: [orderItemId, itemType, status]
      properties:
        orderItemId:
          type: string
          example: OI-1
        passengerId:
          type: string
          example: PAX-1
        segmentId:
          type: string
          example: SEG-1
        itemType:
          type: string
          enum: [FLIGHT, SEAT, BAGGAGE, MEAL, LOUNGE, WIFI, ASSISTANCE, OTHER]
        status:
          type: string
          enum: [CONFIRMED, PENDING, CANCELLED, REFUND_REQUESTED, REFUNDED]
        price:
          $ref: '#/components/schemas/Money'
    Order:
      type: object
      required: [orderId, status, passengers, segments, orderItems]
      properties:
        orderId:
          type: string
          example: ORD-123456789
        status:
          type: string
          enum: [CREATED, CONFIRMED, CHANGE_PENDING, CANCEL_PENDING, CANCELLED, REFUNDED]
        channel:
          type: string
          enum: [WEB, MOBILE, AGENT_DESKTOP, SELLER_API, CONTACT_CENTER]
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/Passenger'
        segments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        orderItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalPrice:
          $ref: '#/components/schemas/Money'
        servicingSummary:
          $ref: '#/components/schemas/EligibilitySummary'
        correlationId:
          type: string
    EligibilitySummary:
      type: object
      properties:
        allowedActions:
          type: array
          items:
            type: string
            enum: [CHANGE, SPLIT, CANCEL, REFUND_QUOTE, ADD_ANCILLARY]
        assistedActions:
          type: array
          items:
            type: string
        blockedActions:
          type: array
          items:
            $ref: '#/components/schemas/BlockedAction'
    BlockedAction:
      type: object
      properties:
        action:
          type: string
        reasonCode:
          type: string
          example: CHANNEL_PERMISSION_RESTRICTED
        message:
          type: string
    EligibilityResponse:
      type: object
      properties:
        orderId:
          type: string
        orderLevel:
          $ref: '#/components/schemas/EligibilitySummary'
        passengerLevel:
          type: array
          items:
            type: object
            properties:
              passengerId:
                type: string
              eligibility:
                $ref: '#/components/schemas/EligibilitySummary'
        correlationId:
          type: string
    SplitRequest:
      type: object
      required: [mode, passengerIds]
      properties:
        mode:
          type: string
          enum: [QUOTE, CONFIRM]
        passengerIds:
          type: array
          items:
            type: string
          example: [PAX-2]
        splitQuoteId:
          type: string
          nullable: true
    SplitResponse:
      type: object
      properties:
        orderId:
          type: string
        splitQuoteId:
          type: string
        newOrderId:
          type: string
          nullable: true
        status:
          type: string
          enum: [QUOTED, CONFIRMED, ASSISTED_SERVICE_REQUIRED]
        impactedItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        quoteExpiry:
          type: string
          format: date-time
        correlationId:
          type: string
    ChangeQuoteRequest:
      type: object
      required: [passengerIds, newSegments]
      properties:
        passengerIds:
          type: array
          items:
            type: string
        newSegments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
    ChangeQuoteResponse:
      type: object
      properties:
        orderId:
          type: string
        changeQuoteId:
          type: string
        quoteExpiry:
          type: string
          format: date-time
        fareDifference:
          $ref: '#/components/schemas/Money'
        changeFee:
          $ref: '#/components/schemas/Money'
        taxDifference:
          $ref: '#/components/schemas/Money'
        totalDue:
          $ref: '#/components/schemas/Money'
        totalRefund:
          $ref: '#/components/schemas/Money'
        ancillaryImpact:
          type: array
          items:
            $ref: '#/components/schemas/AncillaryImpact'
        correlationId:
          type: string
    ConfirmChangeRequest:
      type: object
      required: [changeQuoteId]
      properties:
        changeQuoteId:
          type: string
          example: CQ-12345
        paymentMethodReference:
          type: string
          nullable: true
    ConfirmChangeResponse:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
          enum: [CONFIRMED, PAYMENT_PENDING, REFUND_PENDING, ASSISTED_SERVICE_REQUIRED]
        paymentImpact:
          $ref: '#/components/schemas/Money'
        refundImpact:
          $ref: '#/components/schemas/Money'
        auditEventId:
          type: string
        correlationId:
          type: string
    AncillaryContinuityRequest:
      type: object
      required: [passengerIds, targetSegments]
      properties:
        passengerIds:
          type: array
          items:
            type: string
        targetSegments:
          type: array
          items:
            $ref: '#/components/schemas/Segment'
        includeRefundEligibility:
          type: boolean
          default: true
    AncillaryContinuityResponse:
      type: object
      properties:
        orderId:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/AncillaryImpact'
        correlationId:
          type: string
    AncillaryImpact:
      type: object
      properties:
        orderItemId:
          type: string
        itemType:
          type: string
          enum: [SEAT, BAGGAGE, MEAL, LOUNGE, WIFI, ASSISTANCE, OTHER]
        continuityState:
          type: string
          enum: [RETAINED, RESELECT_REQUIRED, REPRICED, REFUND_ELIGIBLE, NON_TRANSFERABLE, UNAVAILABLE, ASSISTED_SERVICE_REQUIRED]
        priceDifference:
          $ref: '#/components/schemas/Money'
        refundAmount:
          $ref: '#/components/schemas/Money'
        reasonCode:
          type: string
          example: SAME_SEAT_UNAVAILABLE
        message:
          type: string
    RefundQuoteRequest:
      type: object
      required: [passengerIds, scope]
      properties:
        passengerIds:
          type: array
          items:
            type: string
        scope:
          type: string
          enum: [FULL_ORDER, SELECTED_PASSENGERS, SELECTED_ITEMS]
        orderItemIds:
          type: array
          items:
            type: string
    RefundQuoteResponse:
      type: object
      properties:
        orderId:
          type: string
        refundQuoteId:
          type: string
        quoteExpiry:
          type: string
          format: date-time
        ticketRefund:
          $ref: '#/components/schemas/Money'
        taxRefund:
          $ref: '#/components/schemas/Money'
        penalty:
          $ref: '#/components/schemas/Money'
        ancillaryRefunds:
          type: array
          items:
            $ref: '#/components/schemas/AncillaryRefundLine'
        estimatedTotalRefund:
          $ref: '#/components/schemas/Money'
        correlationId:
          type: string
    AncillaryRefundLine:
      type: object
      properties:
        orderItemId:
          type: string
        itemType:
          type: string
        refundState:
          type: string
          enum: [REFUNDABLE, NON_REFUNDABLE, SEPARATE_REVIEW_REQUIRED]
        refundAmount:
          $ref: '#/components/schemas/Money'
        reasonCode:
          type: string
    CancelRequest:
      type: object
      required: [refundQuoteId]
      properties:
        refundQuoteId:
          type: string
        customerAcknowledgement:
          type: boolean
          example: true
    CancelResponse:
      type: object
      properties:
        orderId:
          type: string
        cancellationStatus:
          type: string
          enum: [CANCELLED, CANCEL_PENDING, REFUND_PENDING, ASSISTED_SERVICE_REQUIRED]
        refundReference:
          type: string
          nullable: true
        auditEventId:
          type: string
        correlationId:
          type: string
    AuditEvent:
      type: object
      properties:
        eventId:
          type: string
        eventType:
          type: string
          enum: [ORDER_RETRIEVED, ELIGIBILITY_CHECKED, SPLIT_QUOTED, SPLIT_CONFIRMED, CHANGE_QUOTED, CHANGE_CONFIRMED, REFUND_QUOTED, CANCEL_CONFIRMED, PAYMENT_FAILED, ASSISTED_HANDOFF]
        timestamp:
          type: string
          format: date-time
        channel:
          type: string
        actorType:
          type: string
          enum: [CUSTOMER, AGENT, SELLER, SYSTEM]
        correlationId:
          type: string
        details:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [errorCode, message, correlationId]
      properties:
        errorCode:
          type: string
          example: SERVICING_NOT_ALLOWED
        message:
          type: string
          example: This order cannot be changed online.
        reasonCode:
          type: string
          example: CHANNEL_PERMISSION_RESTRICTED
        retryable:
          type: boolean
          example: false
        nextBestAction:
          type: string
          enum: [RETRY, REPRICE, RESELECT, CONTACT_SUPPORT_WITH_CONTEXT, START_ASSISTED_SERVICE, NO_ACTION]
        correlationId:
          type: string
          example: corr_01HZY8ABC
